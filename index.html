<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Calculadora TAI</title>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #1e3c72, #2a5298);
  margin: 0;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

.container {
  background: white;
  padding: 30px;
  border-radius: 20px;
  width: 350px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  text-align: center;
}

h1 {
  margin-bottom: 5px;
  color: #1e3c72;
}

.subtitle {
  font-size: 14px;
  color: #666;
  margin-bottom: 20px;
}

.section {
  margin-top: 15px;
}

.section h3 {
  margin-bottom: 5px;
  color: #2a5298;
}

input {
  width: 80px;
  padding: 8px;
  margin: 5px;
  border-radius: 10px;
  border: 1px solid #ccc;
  text-align: center;
  font-size: 14px;
}

button {
  margin-top: 20px;
  padding: 12px;
  width: 100%;
  border: none;
  border-radius: 12px;
  background: linear-gradient(135deg, #2a5298, #1e3c72);
  color: white;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
  opacity: 0.9;
}

.result {
  margin-top: 20px;
  font-size: 20px;
  font-weight: bold;
  color: #1e3c72;
}

.result span {
  display: block;
  font-size: 16px;
  color: #555;
}
</style>

</head>

<body>

<div class="container">

  <h1>🧠 Calculadora TAI</h1>
  <div class="subtitle">Calcula tu nota del examen fácilmente</div>

  <div class="section">
    <h3>📘 Parte 1 (80 preguntas)</h3>
    <input type="number" id="aciertos1" placeholder="Aciertos">
    <input type="number" id="fallos1" placeholder="Fallos">
  </div>

  <div class="section">
    <h3>📗 Parte 2 (20 preguntas)</h3>
    <input type="number" id="aciertos2" placeholder="Aciertos">
    <input type="number" id="fallos2" placeholder="Fallos">
  </div>

  <button onclick="calcular()">Calcular Nota</button>

  <div class="result" id="resultado"></div>

</div>

<script>
function calcular() {
  let a1 = parseFloat(document.getElementById("aciertos1").value) || 0;
  let f1 = parseFloat(document.getElementById("fallos1").value) || 0;
  let a2 = parseFloat(document.getElementById("aciertos2").value) || 0;
  let f2 = parseFloat(document.getElementById("fallos2").value) || 0;

  let parte1 = a1 - (f1 * 0.25);
  let parte2 = (a2 - (f2 * 0.25)) * 4;
  let total = parte1 + parte2;

  let nota10 = (total / 100) * 10;

  document.getElementById("resultado").innerHTML =
    total.toFixed(2) + " puntos" +
    "<span>(" + nota10.toFixed(2) + " / 10)</span>";
}
</script>

</body>
</html>
